name: iOS Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            xcode: '15.4'
          - runner: macos-15
            xcode: '16.2'

    runs-on: ${{ matrix.runner }}
    name: Xcode ${{ matrix.xcode }} (${{ matrix.runner }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Install Cordova and dependencies
        run: |
          npm install -g cordova
          npm ci

      - name: Create and prepare test project
        run: |
          cordova create "$RUNNER_TEMP/testapp" com.test.purchaseci TestApp
          cd "$RUNNER_TEMP/testapp"
          cordova platform add ios
          cordova plugin add "$GITHUB_WORKSPACE"
          cordova prepare ios

      - name: Build iOS
        working-directory: ${{ runner.temp }}/testapp/platforms/ios
        run: >
          xcodebuild build
          -workspace App.xcworkspace
          -scheme App
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGN_IDENTITY=""
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGNING_ALLOWED=NO
