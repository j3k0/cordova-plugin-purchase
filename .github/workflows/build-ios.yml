name: iOS Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            xcode: '15.4'
          - runner: macos-15
            xcode: '16.2'

    runs-on: ${{ matrix.runner }}
    name: Xcode ${{ matrix.xcode }} (${{ matrix.runner }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Install Cordova and dependencies
        run: |
          npm install -g cordova ios-deploy
          npm ci

      - name: Install paramedic
        run: npm install -g github:apache/cordova-paramedic

      - name: Build iOS
        run: >
          cordova-paramedic
          --platform ios
          --plugin ./
          --justbuild
          --verbose
