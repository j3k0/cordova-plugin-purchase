name: Android Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Cordova and dependencies
        run: |
          npm install -g cordova
          npm ci

      - name: Install paramedic
        run: npm install -g github:apache/cordova-paramedic

      - name: Build Android
        run: >
          cordova-paramedic
          --platform android@latest
          --plugin ./
          --justbuild
          --verbose
